name: checks
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@main
    - name: flake info
      run: nix flake info
    - name: show flake
      run: nix flake show
    - name: style check
      run: nix run 'nixpkgs/nixos-unstable#alejandra' -- --check .
    - name: lint check
      run: nix run 'nixpkgs/nixos-unstable#statix' -- check .
    - name: no unused code check
      run: nix run 'nixpkgs/nixos-unstable#deadnix' -- --fail .
    - name: flake check
      uses: DeterminateSystems/flake-checker-action@v5
      with:
        fail-mode: true
        ignore-missing-flake-lock: false
        send-statistics: false

